[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    e2e: End-to-end tests requiring live Docker stack (--e2e flag required)
    unit: Pure unit tests, no DB or external services
    integration: Integration tests with real DB, mocked externals
