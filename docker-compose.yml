version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: relay_postgres
    environment:
      POSTGRES_DB: relay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - relay_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: relay_pgbouncer
    environment:
      DATABASE_URL: postgres://relay:${POSTGRES_PASSWORD}@postgres:5432/relay
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
      DB_USER: relay
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - relay_net

  redis:
    image: redis:7.2-alpine
    container_name: relay_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - relay_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay_api
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgres://relay:${POSTGRES_PASSWORD}@pgbouncer:5432/relay
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - relay_net

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay_celery_worker
    command: celery -A config.celery worker -Q relay.dispatch,relay.billing,relay.maintenance -c 4 --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgres://relay:${POSTGRES_PASSWORD}@pgbouncer:5432/relay
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - pgbouncer
    networks:
      - relay_net

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay_celery_beat
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgres://relay:${POSTGRES_PASSWORD}@pgbouncer:5432/relay
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - pgbouncer
    networks:
      - relay_net

volumes:
  postgres_data:
  redis_data:

networks:
  relay_net:
    driver: bridge
